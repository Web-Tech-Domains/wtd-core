name: Bug Report
description: Report a reproducible problem in WTD Core.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction and exact output.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Run ...
        2. Visit ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.3.x"
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: WTD Core Version Or Commit
      placeholder: "0.1.0-alpha or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant `php core diagnostics`, logs, or stack traces.
      render: text

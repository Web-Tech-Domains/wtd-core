name: Documentation issue
description: Report unclear, missing, or incorrect documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Which file, section, or page needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is confusing, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Optional wording or structure suggestion.

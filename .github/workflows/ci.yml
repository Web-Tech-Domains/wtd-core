name: Repository Checks

on:
  push:
  pull_request:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: repository-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.3"
          - "8.4"

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer audit --no-interaction
      - run: composer test
      - run: composer analyse
      - run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  frontend:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install
      - run: npm run build

  codeql:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - php
          - javascript-typescript

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  require-approver-review:
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WTD_APPROVER_TOKEN || github.token }}
          script: |
            const org = 'Web-Tech-Domains';
            const team_slug = 'approvers';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request?.number
              ?? Number(context.payload.review.pull_request_url.split('/').pop());

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestStateByUser = new Map();

            for (const review of reviews) {
              if (review.user?.type === 'User') {
                latestStateByUser.set(review.user.login, review.state);
              }
            }

            const approvedUsers = [...latestStateByUser.entries()]
              .filter(([, state]) => state === 'APPROVED')
              .map(([login]) => login);

            for (const username of approvedUsers) {
              try {
                const membership = await github.rest.teams.getMembershipForUserInOrg({
                  org,
                  team_slug,
                  username,
                });

                if (membership.data.state === 'active') {
                  core.info(`Approved by @${username}, an active member of @${org}/${team_slug}.`);
                  return;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            core.setFailed(`This pull request requires at least one approval from @${org}/${team_slug}.`);

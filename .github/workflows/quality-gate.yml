name: WTD Core Quality Gate

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop
  pull_request_target:
    branches:
      - master
      - main
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: repository-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP Quality (PHP ${{ matrix.php-version }})
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.3"
          - "8.4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Run PHPUnit tests
        run: composer test

      - name: Run PHPStan analysis
        run: composer analyse

      - name: Check PHP code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  frontend:
    name: Frontend Build
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

  codeql:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    name: CodeQL Security Scan (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  request-approver-review:
    name: Request Approver Review
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    steps:
      - name: Request approver team review
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const team_slug = 'approvers';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            if (context.payload.pull_request.draft) {
              core.info('Pull request is draft; approver team request skipped.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                team_reviewers: [team_slug],
              });

              core.info(`Requested review from @${owner}/${team_slug}.`);
            } catch (error) {
              if ([403, 404, 422].includes(error.status)) {
                core.warning(`Could not request @${owner}/${team_slug}: ${error.message}`);
                return;
              }

              throw error;
            }

  require-approver-review:
    name: Approver Review
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest

    steps:
      - name: Require approver team review
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.WTD_APPROVER_TOKEN || github.token }}
          script: |
            const org = 'Web-Tech-Domains';
            const team_slug = 'approvers';
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request?.number
              ?? Number(context.payload.review.pull_request_url.split('/').pop());

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestStateByUser = new Map();

            for (const review of reviews) {
              if (
                review.user?.type === 'User'
                && ['APPROVED', 'CHANGES_REQUESTED', 'DISMISSED'].includes(review.state)
              ) {
                latestStateByUser.set(review.user.login, review.state);
              }
            }

            const approvedUsers = [...latestStateByUser.entries()]
              .filter(([, state]) => state === 'APPROVED')
              .map(([login]) => login);

            core.info(`Found active approval decisions from: ${approvedUsers.length > 0 ? approvedUsers.join(', ') : 'none'}.`);

            for (const username of approvedUsers) {
              try {
                const membership = await github.rest.teams.getMembershipForUserInOrg({
                  org,
                  team_slug,
                  username,
                });

                if (membership.data.state === 'active') {
                  core.info(`Approved by @${username}, an active member of @${org}/${team_slug}.`);
                  return;
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            core.setFailed(`This pull request requires at least one approval from @${org}/${team_slug}.`);

name: WTD Core Quality Gate

on:
  push:
    branches:
      - master
      - main
      - develop
      - "release/**"
      - "hotfix/**"
      - "bugfix/**"
  pull_request:
    branches:
      - master
      - main
      - develop
      - "release/**"
      - "hotfix/**"
      - "bugfix/**"
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: repository-checks-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request_review' }}

jobs:
  php:
    name: PHP Quality (PHP ${{ matrix.php-version }})
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.3"
          - "8.4"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Run PHPUnit tests
        run: composer test

      - name: Run PHPStan analysis
        run: composer analyse

      - name: Check PHP code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  frontend:
    name: Frontend Build
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

  codeql:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    name: CodeQL Security Scan (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
